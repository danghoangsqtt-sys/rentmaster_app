
<!DOCTYPE html>
<html lang="vi" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>RentMaster Pro</title>
  <link rel="icon" type="image/png" href="/rentmaster_logo.png" />
  <link rel="apple-touch-icon" href="/rentmaster_logo.png" />
  
  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #FFFFFF;
      font-family: 'Inter', sans-serif;
    }
    
    /* Ẩn hoàn toàn thanh cuộn nhưng giữ chức năng cuộn */
    * {
      -ms-overflow-style: none; /* IE CSS */
      scrollbar-width: none; /* Firefox CSS */
    }
    *::-webkit-scrollbar {
      display: none; /* Chrome, Safari, Edge */
      opacity: 0;
      width: 0;
      height: 0;
    }

    /* Safe Area Helpers */
    .pt-safe {
      padding-top: env(safe-area-inset-top);
    }
    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom);
    }
    .mt-safe {
      margin-top: env(safe-area-inset-top);
    }

    #error-display {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #7f1d1d;
      color: white;
      padding: 20px;
      display: none;
      z-index: 10000;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
    }
    #initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      z-index: 9999;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.5s;
    }
    .loader-brand {
      width: 110px;
      height: 110px;
      margin-bottom: 30px;
      border-radius: 26px;
      background: url('/rentmaster_logo.png') center/cover no-repeat;
      animation: float 3s ease-in-out infinite, pulse-glow 2s infinite;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 10px 30px rgba(59, 130, 246, 0.15); }
      50% { box-shadow: 0 20px 45px rgba(59, 130, 246, 0.35); }
    }
    .loader-text {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #0284c7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    .loader-bar-container {
      width: 150px;
      height: 4px;
      background: #e2e8f0;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    .loader-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, #0ea5e9, #6366f1);
      border-radius: 4px;
      animation: loading-bar 1.5s cubic-bezier(0.65, 0, 0.35, 1) infinite;
    }
    @keyframes loading-bar {
      0% { left: -30%; }
      100% { left: 130%; }
    }
  </style>

  <script src="https://cdn.tailwindcss.com"></script>
  
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0?external=react",
    "react-router-dom": "https://esm.sh/react-router-dom@7.0.0?external=react,react-dom",
    "@capacitor/core": "https://esm.sh/@capacitor/core@6.1.2",
    "@capacitor/filesystem": "https://esm.sh/@capacitor/filesystem@6.0.2",
    "@capacitor/preferences": "https://esm.sh/@capacitor/preferences@6.0.2",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            gray: {
              750: '#2d3748',
              850: '#1a202c',
              950: '#0d1117',
            }
          }
        }
      }
    }
  </script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-white text-slate-900 transition-colors duration-200">
  <div id="error-display"></div>

  <div id="initial-loader">
    <div class="loader-brand"></div>
    <p class="loader-text">RentMaster</p>
    <div class="loader-bar-container">
      <div class="loader-bar"></div>
    </div>
  </div>
  
  <div id="root" class="h-full"></div>

  <script type="module" src="./index.tsx"></script>

  <script>
    window.addEventListener('app-ready', () => {
      const loader = document.getElementById('initial-loader');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 500);
      }
    });

    // Fallback bảo vệ: Tự động ẩn loader sau 5 giây nếu React không phản hồi
    setTimeout(() => {
      const loader = document.getElementById('initial-loader');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 500);
      }
    }, 5000);
  </script>
</body>
</html>
